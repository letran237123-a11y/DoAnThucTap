{{- $src := .Destination -}}
{{- $isRemote := or (hasPrefix $src "http://") (hasPrefix $src "https://") (hasPrefix $src "//") (hasPrefix $src "data:") -}}
{{- if and (not $isRemote) (hasPrefix $src "/") -}}
  {{- $src = $src | relURL -}}
{{- end -}}
<img src="{{ $src | safeURL }}" alt="{{ .Text | plainify }}"{{ with .Title }} title="{{ . }}"{{ end }}>
